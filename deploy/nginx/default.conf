# Docker embedded DNS — resolve upstreams at request time (hmdm may start later).
resolver 127.0.0.11 valid=10s ipv6=off;

server {
    listen 80;
    server_name _;

    client_max_body_size 16m;

    location /rest/windows/ {
        set $windows_upstream server-windows:8082;
        proxy_pass http://$windows_upstream/rest/windows/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        set $hmdm_upstream hmdm:8080;
        proxy_pass http://$hmdm_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
