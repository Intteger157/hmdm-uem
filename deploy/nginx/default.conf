# Docker embedded DNS — resolve upstreams at request time (hmdm may start later).
resolver 127.0.0.11 valid=10s ipv6=off;

server {
    listen 80;
    server_name _;

    client_max_body_size 16m;

    # Static upstream (no variable): variable proxy_pass drops the URI suffix (e.g. /enroll).
    location /rest/windows/ {
        proxy_pass http://server-windows:8082;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        set $hmdm_upstream hmdm;
        proxy_pass http://$hmdm_upstream:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
