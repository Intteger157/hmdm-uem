# Docker embedded DNS — resolve upstreams at request time (hmdm may start later).
resolver 127.0.0.11 valid=10s ipv6=off;

server {
    listen 80;
    server_name _;

    client_max_body_size 256m;

    # Go Windows agent API (variable upstream → Docker DNS re-resolve after container recreate)
    location /rest/windows/ {
        set $windows_upstream server-windows;
        proxy_pass http://$windows_upstream:8082;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # Java MDM REST API (no legacy Angular UI)
    location /rest/ {
        set $hmdm_upstream hmdm;
        proxy_pass http://$hmdm_upstream:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        client_max_body_size 256m;
    }

    # APK / file downloads (Android QR provisioning hits this before MQTT)
    location /files/ {
        set $hmdm_upstream hmdm;
        proxy_pass http://$hmdm_upstream:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # React MDM console (frontend-v2)
    location / {
        proxy_pass http://frontend-v2:80;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
