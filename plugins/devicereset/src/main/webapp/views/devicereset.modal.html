<div class="modal-header">
    <button type="button" class="close" ng-click="closeModal()">&times;</button>
    <h4 class="modal-title" localized>plugin.devicereset.modal.title</h4>
</div>

<div class="modal-body">
    <div class="alert alert-danger" ng-if="errorMessage">{{errorMessage}}</div>

    <p localized>plugin.devicereset.modal.device</p>
    <p><strong>{{device.number}}</strong></p>

    <div class="form-group" ng-if="status">
        <span class="label label-warning" ng-if="status.factoryReset" localized>plugin.devicereset.status.reset</span>
        <span class="label label-info" ng-if="status.reboot" localized>plugin.devicereset.status.reboot</span>
        <span class="label label-danger" ng-if="status.lock" localized>plugin.devicereset.status.lock</span>
    </div>

    <div class="form-group">
        <label localized>plugin.devicereset.label.lockMessage</label>
        <input class="form-control" ng-model="lockMessage" maxlength="500"/>
    </div>

    <div class="form-group">
        <label localized>plugin.devicereset.label.password</label>
        <input class="form-control" ng-model="password" type="password"/>
    </div>
</div>

<div class="modal-footer">
    <button type="button" class="btn btn-default" ng-click="closeModal()" ng-disabled="busy" localized>button.cancel</button>
    <button type="button" class="btn btn-info" ng-click="rebootDevice()" ng-disabled="busy" localized>plugin.devicereset.button.reboot</button>
    <button type="button" class="btn btn-warning" ng-click="lockDevice()" ng-disabled="busy" localized>plugin.devicereset.button.lock</button>
    <button type="button" class="btn btn-default" ng-click="unlockDevice()" ng-disabled="busy" localized>plugin.devicereset.button.unlock</button>
    <button type="button" class="btn btn-primary" ng-click="resetPassword()" ng-disabled="busy" localized>plugin.devicereset.button.password</button>
    <button type="button" class="btn btn-danger" ng-click="factoryResetDevice()" ng-disabled="busy" localized>plugin.devicereset.button.reset</button>
</div>
